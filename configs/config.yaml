provider:
  type: openai-compatible
  baseURL: https://api.deepseek.com
  apiKeyEnv: DEEPSEEK_API_KEY
  model: deepseek-v4-pro
  fastModel: deepseek-v4-flash
  timeoutMs: 300000
  maxTokens: 16000
  fastMaxTokens: 3000
  maxRetries: 3
  retryDelayMs: 2000

agent:
  defaultMode: safe
  requireShellApproval: true
  shell: auto

storage:
  sqlitePath: ./data/aegisprobe.sqlite

policy:
  blockDangerousCommands: true

skills:
  enabled: true
  roots:
    - ../skills
    - ../../skills
  includeYaml: true
  includeMarkdown: true
  maxDepth: 6
  maxSkillBytes: 80000
  excludeDirs:
    - _projects
    - node_modules
    - .git
    - dist
    - build

fofa:
  enabled: true
  keyEnv: FOFA_KEY
  baseUrl: https://fofa.info/api/v1
  maxResults: 10000

webResearch:
  enabled: true
  searchProvider: duckduckgo-lite
  searchEndpoint: https://lite.duckduckgo.com/lite/
  maxResults: 10
  timeoutMs: 30000
  maxFetchBytes: 2000000
  maxRetries: 2
  userAgent: AegisProbe/1.0 research

mcp:
  enabled: true
  servers:
    - name: playwright
      command: node
      args:
        - "./node_modules/@playwright/mcp/cli.js"
        - "--headless"
        - "--browser"
        - "chromium"
        - "--no-sandbox"
        - "--port"
        - "3200"
